interface:
  display_name: "DB Craft"
  short_description: "Visual schema design, SQL export, and migration-ready handoff"
  default_prompt: "Use DB Craft to open the local visual schema studio, help the user design or update tables and relationships, save the model in the active workspace, validate the schema, and export SQL or handoff-ready artifacts. In all conversations for the same workspace, keep both table creation and table changes reflected in the current model/diagram unless the user explicitly asks for a new model, remind them where the model files are stored, and stop at model plus SQL handoff when database execution should be handled by a separate migration or deployment workflow."
